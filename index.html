<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Texture Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 10px; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        .header { background: #333; padding: 15px; border-radius: 8px; margin-bottom: 20px; width: 100%; max-width: 600px; text-align: center; }
        .main-container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        canvas { border: 4px solid #fff; width: 320px; height: 320px; max-width: 80vw; max-height: 80vw; image-rendering: pixelated; cursor: crosshair; background: #fff; }
        .tool-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #333; padding: 15px; border-radius: 8px; width: 320px; }
        .footer { margin-top: 20px; padding: 15px; border-top: 2px solid #333; width: 320px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <label>種類: </label>
        <select id="texType"><option value="blocks">ブロック</option><option value="items">アイテム</option></select>
        <label> ID名: </label>
        <input type="text" id="texId" value="dirt" style="width: 60px;">
    </div>

    <div class="main-container">
        <canvas id="canvas"></canvas>
        <div class="tool-panel">
            <select id="tool" style="grid-column: span 2;">
                <option value="pencil" selected>ペン</option>
                <option value="eraser">消しゴム</option>
                <option value="line">直線</option>
                <option value="rect">四角形</option>
                <option value="fill">塗りつぶし</option>
            </select>
            <input type="color" id="colorPicker" value="#ff0000">
            <select id="resolution" onchange="initCanvas()">
                <option value="16">16x16</option>
                <option value="32">32x32</option>
            </select>
            <button onclick="undo()">元に戻す</button>
            <button onclick="clearAll()">全クリア</button>
        </div>
    </div>

    <div class="footer">
        <input type="file" id="imageLoader" accept="image/*" style="width:100%; margin-bottom:10px;">
        <button onclick="downloadMcpack()" style="width:100%; padding: 10px 20px; background:#4caf50; color:#fff; border:none; cursor:pointer;">生成してダウンロード</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false, startX, startY, snapshot, history = [];

        function initCanvas() {
            const res = parseInt(document.getElementById('resolution').value);
            canvas.width = res; canvas.height = res;
            ctx.clearRect(0, 0, res, res);
            const s = res === 16 ? 16 : 8;
            canvas.style.backgroundImage = `linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%)`;
            canvas.style.backgroundSize = `${s*2}px ${s*2}px`;
            canvas.style.backgroundPosition = `0 0, 0 ${s}px, ${s}px -${s}px, -${s}px 0px`;
            history = [];
        }

        // 座標計算（マウス/タッチ両対応）
        function getCoords(e) {
            const r = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: Math.floor((clientX - r.left) / (r.width / canvas.width)),
                y: Math.floor((clientY - r.top) / (r.height / canvas.height))
            };
        }

        // 画像インポート機能
        document.getElementById('imageLoader').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    saveHistory();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    e.target.value = '';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        };

        // 描画ロジック
        function saveHistory() { history.push(ctx.getImageData(0, 0, canvas.width, canvas.height)); if(history.length > 20) history.shift(); }
        function undo() { if (history.length > 0) ctx.putImageData(history.pop(), 0, 0); }
        function clearAll() { if(confirm("全クリアしますか？")) { saveHistory(); ctx.clearRect(0, 0, canvas.width, canvas.height); } }

        function startDraw(e) {
            isDrawing = true;
            const pos = getCoords(e);
            startX = pos.x; startY = pos.y;
            saveHistory();
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            if(document.getElementById('tool').value === 'fill') floodFill(pos.x, pos.y, document.getElementById('colorPicker').value);
        }

        function drawing(e) {
            if (!isDrawing) return;
            const pos = getCoords(e);
            const tool = document.getElementById('tool').value;
            const color = document.getElementById('colorPicker').value;

            if (tool === 'pencil' || tool === 'eraser') {
                if (tool === 'eraser') ctx.clearRect(pos.x, pos.y, 1, 1);
                else { ctx.fillStyle = color; ctx.fillRect(pos.x, pos.y, 1, 1); }
            } else if (tool === 'line' || tool === 'rect') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.strokeStyle = color;
                if (tool === 'line') { ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
                else ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
            }
        }

        // イベント設定
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', drawing);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); drawing(e); }, { passive: false });
        canvas.addEventListener('touchend', () => isDrawing = false);

        // 塗りつぶしアルゴリズム
        function floodFill(x, y, hexColor) {
            const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const target = getPixel(img, x, y);
            const rep = hexToRgba(hexColor);
            if (isSameColor(target, rep)) return;
            const stack = [[x, y]];
            while (stack.length) {
                const [cx, cy] = stack.pop();
                if (cx < 0 || cx >= canvas.width || cy < 0 || cy >= canvas.height) continue;
                if (isSameColor(getPixel(img, cx, cy), target)) {
                    setPixel(img, cx, cy, rep);
                    stack.push([cx+1, cy], [cx-1, cy], [cx, cy+1], [cx, cy-1]);
                }
            }
            ctx.putImageData(img, 0, 0);
        }

        function getPixel(img, x, y) { const i = (y * img.width + x) * 4; return [img.data[i], img.data[i+1], img.data[i+2], img.data[i+3]]; }
        function setPixel(img, x, y, c) { const i = (y * img.width + x) * 4; img.data[i]=c[0]; img.data[i+1]=c[1]; img.data[i+2]=c[2]; img.data[i+3]=c[3]; }
        function isSameColor(a, b) { return a[0]===b[0] && a[1]===b[1] && a[2]===b[2] && a[3]===b[3]; }
        function hexToRgba(hex) { const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16); return [r, g, b, 255]; }

        async function downloadMcpack() {
            const zip = new JSZip();
            const type = document.getElementById('texType').value;
            const id = document.getElementById('texId').value;
            const imgData = canvas.toDataURL().split(',')[1];
            const manifest = { "format_version": 2, "header": { "name": "StudioPack", "uuid": crypto.randomUUID(), "version": [1,0,0], "min_engine_version": [1,20,0] }, "modules": [{ "type": "resources", "uuid": crypto.randomUUID(), "version": [1,0,0] }] };
            zip.file("manifest.json", JSON.stringify(manifest, null, 2));
            zip.folder(`textures/${type}`).file(`${id}.png`, imgData, {base64: true});
            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a'); link.href = URL.createObjectURL(content); link.download = `${id}_pack.mcpack`; link.click();
        }
        initCanvas();
    </script>
</body>
</html>
