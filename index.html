<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Texture Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; }
        .header { background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; width: 100%; max-width: 320px; text-align: center; }
        canvas { border: 4px solid #fff; width: 300px; height: 300px; max-width: 90vw; max-height: 90vw; image-rendering: pixelated; background: #fff; }
        .tool-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 300px; max-width: 90vw; margin-top: 10px; }
        .footer { margin-top: 10px; width: 300px; max-width: 90vw; }
        /* 説明文のスタイル */
        .help-section { width: 300px; max-width: 90vw; background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
        button { padding: 12px; cursor: pointer; width: 100%; }
        select, input { padding: 8px; width: 100%; }
    </style>
</head>
<body>

    <div class="help-section">
        <details>
            <summary>使い方ガイド（ここをタップ）</summary>
            <p><strong>テクスチャパック簡単作成メーカー＜統合版対応＞</strong><br>
            このサイトを使えば、マイクラのブロックやアイテムの見た目を、自分で描いたドット絵に簡単に変更できます。<br>
            1. 種類とID名を指定します（IDは正確に入力してください）。<br>
            2. ドットを描くか、画像ファイルを読み込ませます。<br>
            3. 「生成してダウンロード」でmcpackを作成し、マイクラで開いて反映させます。</p>
        </details>
    </div>

    <div class="header">
        種類: <select id="texType"><option value="blocks">ブロック</option><option value="items">アイテム</option></select>
        ID: <input type="text" id="texId" value="dirt">
    </div>

    <canvas id="canvas"></canvas>

    <div class="tool-panel">
        <select id="tool" style="grid-column: span 2;">
            <option value="pencil">ペン</option><option value="eraser">消しゴム</option>
            <option value="line">直線</option><option value="rect">四角形</option><option value="fill">塗りつぶし</option>
        </select>
        <input type="color" id="colorPicker" value="#ff0000">
        <select id="resolution" onchange="initCanvas()">
            <option value="16">16x16</option><option value="32">32x32</option>
        </select>
        <button onclick="undo()">元に戻す</button>
        <button onclick="clearAll()">全クリア</button>
    </div>

    <div class="footer">
        <input type="file" id="imageLoader" accept="image/*" style="margin-bottom:10px;">
        <button onclick="downloadMcpack()" style="background:#4caf50; color:#fff; border:none;">生成してダウンロード</button>
    </div>

    <script>
        // (以前のJavaScriptロジックをここに貼り付けてください)
        // initCanvas(), startDraw(), drawing() などの関数群
    </script>
</body>
</html>
